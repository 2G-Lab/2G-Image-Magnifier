<!DOCTYPE html>
<html>
  <head>
    <title>The Magnifier Example</title>

    <style>
      main{margin:auto;max-width:fit-content;padding-top:200px;}
      div{float:left;text-align:center;}
      img{width:354px;}
    </style>

    <script src="https://cdn.jsdelivr.net/gh/2G-Lab/2G-Image-Magnifier/magnifier.js"></script>
    <script>new x2G_ImageMagnifier ("images2magnify");</script>

    <!-- The Magnifier.js script adds a style sheet to the page that describes -->
    <!-- the appearance of the magnified image and accompanying elements.      -->
    <!--
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/2G-Lab/2G-Image-Magnifier/style.css">
     -->

  </head>
  <body>

    <main>
      <div>
        <img src="./example-img-0.png" alt="NOT expandable image">
        <p><em>NOT expandable image</em></p>
      </div>
      <div>
        <img src="./example-img-1.png" alt="Expandable image 1" class="images2magnify">
        <p><em>Expandable image 1</em></p>
      </div>
      <div>
        <img src="./example-img-2.png" alt="Expandable image 2" class="images2magnify">
        <p><em>Expandable image 2</em></p>
      </div>
    </main>

    <!-- To show magnified images, the magnifier.js creates container as follows. -->
    <!--
    <div id="x2G_outerBox">
      <div id="x2G_closeBut">&times;</div>
      <div id="x2G_captions"></div>
      <img id="x2G_expImage">
    </div>
    -->
  </body>
</html>
